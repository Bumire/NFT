<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Template</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f4f4;">
  
  <!-- Main wrapper table (CENTER the email) -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center">

        <!-- Actual email container -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff; padding:20px;">

          <!-- HEADER -->
          <tr>
            <td align="center" style="padding:20px;">
              <img src="https://via.placeholder.com/150x50" alt="Logo" style="display:block;">
            </td>
          </tr>

          <!-- HERO BANNER -->
          <tr>
            <td>
              <img src="https://via.placeholder.com/600x250" alt="Banner" style="width:100%; display:block;">
            </td>
          </tr>

          <!-- HEADLINE TEXT -->
          <tr>
            <td style="padding:20px; font-family:Arial; font-size:24px; font-weight:bold; color:#333;">
              Welcome to Our Newsletter!
            </td>
          </tr>

          <!-- PARAGRAPH TEXT -->
          <tr>
            <td style="padding:0 20px 20px 20px; font-family:Arial; font-size:15px; color:#555; line-height:1.6;">
              We're excited to have you here. This email was designed using pure HTML and inline CSS,
              which makes it compatible with Gmail, Outlook, Yahoo, and all major email clients.
            </td>
          </tr>

          <!-- BUTTON -->
          <tr>
            <td align="center" style="padding:20px;">
              <a href="#"
                 style="background-color:#007BFF; color:#ffffff; padding:12px 24px; font-family:Arial; 
                        text-decoration:none; font-size:16px; border-radius:5px; display:inline-block;">
                Learn More
              </a>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding:20px; font-family:Arial; font-size:12px; color:#999;">
              © 2025 Your Company. All rights reserved.<br>
              1234 Street, City, Country.
            </td>
          </tr>

        </table><!-- END email container -->

      </td>
    </tr>
  </table><!-- END wrapper -->

</body>
</html>
