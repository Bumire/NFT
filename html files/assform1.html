<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
        .container{
            display: flex;
            height: 100vh;
            /* width: 100%; */
            
            
        }
        .down{
            width: 100%;
            background-image: url(purpleimg.jpeg);
            background-size: cover;
            background-position: center;
            color: white;
            padding: 50px;
        }
         .down h1{
            font-size: 30px;
            margin-top: 23rem;
            
        }
        .form{
            width: 27rem;
            height: 30rem;
            background: white;
            padding: 25px;
            padding-top: 3rem;
            border-radius: 15px;
            position: absolute;
            top: 35px;
            right: 40px
        }
   
    
        .form input{
            width: 80%;
            padding: 12px;
            border: 1px solid ;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .login-btn{
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .list-tick{
            display:flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 1rem;
            padding-right: 3rem;
            padding-left: 2rem;
            
        }
    
        .or{
            text-align: center;
            margin-bottom: 15px;
           
        }
        .google-btn{
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px ;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="down">
        <!-- <img src="purpleimg.jpeg" alt=""> -->
   <h1>Edit faster. Export Faster. <br>Create Anywhere</h1>
   <p>From quick social media clips to full-length videos. Our powerful editor <br> lets you work seamlessly across device.</p>
        </div>

        <div class="form">
            <h2>WELCOME BACK!</h2>

            <input type="email" placeholder="Email"><br>
            <input type="password" placeholder="Password"><br>

            <div class="list-tick">
                <label><input type="checkbox">Remember me</label>
                <a href=""class="forgot">Forgot password?</a>
            </div>

            <button class="login-btn">Login</button>
            <p class="or">or continue with</p>

            <button class="google-btn">
                <img src="" alt="">continue with google</button>
                <p class="signup">Don't have an account? <a href="">Sign up</a></p>
             
        
        </div>


   </div>
</body>
</html>
